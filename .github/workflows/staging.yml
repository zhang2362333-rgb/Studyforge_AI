name: Staging Review and Deploy

on:
  pull_request:
    branches:
      - staging
    paths:
      - "studyforge-server/**"
      - "studyforge-frontend/**"
      - "sql/**"
      - "scripts/**"
      - "docs/server-deployment.md"
      - "docs/staging-deployment.md"
      - ".github/workflows/staging.yml"
      - ".gitignore"
  push:
    branches:
      - staging
    paths:
      - "studyforge-server/**"
      - "studyforge-frontend/**"
      - "sql/**"
      - "scripts/**"
      - "docs/server-deployment.md"
      - "docs/staging-deployment.md"
      - ".github/workflows/staging.yml"
      - ".gitignore"
  workflow_dispatch:

concurrency:
  group: staging
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sql-mysql8:
    name: SQL MySQL 8 Import
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_DATABASE: studyforge_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install MySQL client
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y default-mysql-client

      - name: Import schema, seed, and migrations
        env:
          DB_CLIENT: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: "3306"
          DB_NAME: studyforge_ci
          DB_USER: root
          RESET_SEED: "1"
        run: ./scripts/import_local_db.sh

  review:
    name: Automated Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Repository hygiene guard
        run: |
          set -euo pipefail
          if git ls-files | grep -E '(^|/)(node_modules|target|dist|coverage|uploads)(/|$)|\.(war|jar|tar\.gz)$'; then
            echo "Generated files or uploads are tracked by git." >&2
            exit 1
          fi

      - name: Secret pattern guard
        run: |
          set -euo pipefail
          if git grep -nE '(sk-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9_]{30,}|github_pat_[A-Za-z0-9_]+|AKIA[0-9A-Z]{16}|AIza[0-9A-Za-z_-]{35})' -- . ':!studyforge-frontend/package-lock.json'; then
            echo "Potential secret detected in tracked files." >&2
            exit 1
          fi

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build backend
        working-directory: studyforge-server
        run: mvn -DskipTests package

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: studyforge-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: studyforge-frontend
        run: npm ci

      - name: Typecheck frontend
        working-directory: studyforge-frontend
        run: npm run typecheck

      - name: Build frontend
        working-directory: studyforge-frontend
        run: npm run build

      - name: Prepare staging artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          mkdir -p artifact/backend artifact/frontend
          cp studyforge-server/studyforge-webapi/target/studyforge-webapi-1.0.0-SNAPSHOT.war artifact/backend/studyforge-webapi.war
          cp -R studyforge-frontend/apps/knowledge-web/dist artifact/frontend/knowledge
          cp -R studyforge-frontend/apps/portal-web/dist artifact/frontend/portal
          tar -czf studyforge-staging-release.tar.gz -C artifact .

      - name: Upload staging artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v5
        with:
          name: studyforge-staging-release
          path: studyforge-staging-release.tar.gz
          if-no-files-found: error
          retention-days: 7

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs:
      - review
      - sql-mysql8
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download staging artifact
        uses: actions/download-artifact@v5
        with:
          name: studyforge-staging-release

      - name: Check staging deploy secrets
        id: deploy_secrets
        env:
          STAGING_DEPLOY_HOST: ${{ secrets.STAGING_DEPLOY_HOST }}
          STAGING_DEPLOY_PORT: ${{ secrets.STAGING_DEPLOY_PORT }}
          STAGING_DEPLOY_USER: ${{ secrets.STAGING_DEPLOY_USER }}
          STAGING_DEPLOY_SSH_KEY: ${{ secrets.STAGING_DEPLOY_SSH_KEY }}
          STAGING_KNOWN_HOSTS: ${{ secrets.STAGING_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          if [ -z "${STAGING_DEPLOY_HOST}" ] || [ -z "${STAGING_DEPLOY_PORT}" ] || [ -z "${STAGING_DEPLOY_USER}" ] || [ -z "${STAGING_DEPLOY_SSH_KEY}" ] || [ -z "${STAGING_KNOWN_HOSTS}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Staging deploy secrets are incomplete. Skipping deployment."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure SSH
        if: steps.deploy_secrets.outputs.configured == 'true'
        env:
          STAGING_DEPLOY_SSH_KEY: ${{ secrets.STAGING_DEPLOY_SSH_KEY }}
          STAGING_KNOWN_HOSTS: ${{ secrets.STAGING_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$STAGING_DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$STAGING_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Upload release and deploy script
        if: steps.deploy_secrets.outputs.configured == 'true'
        env:
          STAGING_DEPLOY_HOST: ${{ secrets.STAGING_DEPLOY_HOST }}
          STAGING_DEPLOY_PORT: ${{ secrets.STAGING_DEPLOY_PORT }}
          STAGING_DEPLOY_USER: ${{ secrets.STAGING_DEPLOY_USER }}
        run: |
          set -euo pipefail
          scp -i ~/.ssh/deploy_key -P "$STAGING_DEPLOY_PORT" \
            studyforge-staging-release.tar.gz scripts/deploy_staging.sh \
            "${STAGING_DEPLOY_USER}@${STAGING_DEPLOY_HOST}:/tmp/"

      - name: Deploy on staging server
        if: steps.deploy_secrets.outputs.configured == 'true'
        env:
          STAGING_DEPLOY_HOST: ${{ secrets.STAGING_DEPLOY_HOST }}
          STAGING_DEPLOY_PORT: ${{ secrets.STAGING_DEPLOY_PORT }}
          STAGING_DEPLOY_USER: ${{ secrets.STAGING_DEPLOY_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -p "$STAGING_DEPLOY_PORT" \
            "${STAGING_DEPLOY_USER}@${STAGING_DEPLOY_HOST}" \
            "bash /tmp/deploy_staging.sh /tmp/studyforge-staging-release.tar.gz ${{ github.sha }}"

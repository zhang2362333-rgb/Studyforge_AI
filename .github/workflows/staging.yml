name: Staging Review and Deploy

on:
  pull_request:
    branches:
      - staging
    paths:
      - "studyforge-server/**"
      - "studyforge-frontend/**"
      - "sql/**"
      - "scripts/**"
      - "deploy/docker/**"
      - "docs/server-deployment.md"
      - "docs/staging-deployment.md"
      - ".github/workflows/staging.yml"
      - ".dockerignore"
      - ".gitignore"
  push:
    branches:
      - staging
  workflow_dispatch:

concurrency:
  group: staging
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  sql-mysql8:
    name: SQL MySQL 8 Import
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_DATABASE: studyforge_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install MySQL client
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y default-mysql-client

      - name: Import schema, seed, and migrations
        env:
          DB_CLIENT: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: "3306"
          DB_NAME: studyforge_ci
          DB_USER: root
          RESET_SEED: "1"
        run: ./scripts/import_local_db.sh

  review:
    name: Automated Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Repository hygiene guard
        run: |
          set -euo pipefail
          if git ls-files | grep -E '(^|/)(node_modules|target|dist|coverage|uploads)(/|$)|\.(war|jar|tar\.gz)$'; then
            echo "Generated files or uploads are tracked by git." >&2
            exit 1
          fi

      - name: Secret pattern guard
        run: |
          set -euo pipefail
          if git grep -nE '(sk-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9_]{30,}|github_pat_[A-Za-z0-9_]+|AKIA[0-9A-Z]{16}|AIza[0-9A-Za-z_-]{35})' -- . ':!studyforge-frontend/package-lock.json'; then
            echo "Potential secret detected in tracked files." >&2
            exit 1
          fi

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build backend
        working-directory: studyforge-server
        run: mvn -DskipTests package

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: studyforge-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: studyforge-frontend
        run: npm ci

      - name: Typecheck frontend
        working-directory: studyforge-frontend
        run: npm run typecheck

      - name: Build frontend
        working-directory: studyforge-frontend
        run: |
          set -euo pipefail
          VITE_BASE_PATH=/ npm run build:knowledge
          VITE_BASE_PATH=/portal/ npm run build:portal

      - name: Set Docker image names
        id: docker_meta
        run: |
          set -euo pipefail
          image_owner="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "api_image=ghcr.io/${image_owner}/studyforge-ai-api" >> "$GITHUB_OUTPUT"
          echo "web_image=ghcr.io/${image_owner}/studyforge-ai-web" >> "$GITHUB_OUTPUT"
          echo "migrate_image=ghcr.io/${image_owner}/studyforge-ai-migrate" >> "$GITHUB_OUTPUT"
          echo "mysql_image=ghcr.io/${image_owner}/studyforge-ai-mysql" >> "$GITHUB_OUTPUT"

      - name: Build Docker images
        run: |
          set -euo pipefail
          docker build -f deploy/docker/api.Dockerfile \
            -t "${{ steps.docker_meta.outputs.api_image }}:${{ github.sha }}" \
            -t "${{ steps.docker_meta.outputs.api_image }}:staging" .
          docker build -f deploy/docker/web.Dockerfile \
            -t "${{ steps.docker_meta.outputs.web_image }}:${{ github.sha }}" \
            -t "${{ steps.docker_meta.outputs.web_image }}:staging" .
          docker build -f deploy/docker/migrate.Dockerfile \
            -t "${{ steps.docker_meta.outputs.migrate_image }}:${{ github.sha }}" \
            -t "${{ steps.docker_meta.outputs.migrate_image }}:staging" .
          docker build -f deploy/docker/mysql.Dockerfile \
            -t "${{ steps.docker_meta.outputs.mysql_image }}:${{ github.sha }}" \
            -t "${{ steps.docker_meta.outputs.mysql_image }}:staging" .

      - name: Login to GHCR
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          printf '%s' "$GITHUB_TOKEN" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Push Docker images
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          docker push "${{ steps.docker_meta.outputs.api_image }}:${{ github.sha }}"
          docker push "${{ steps.docker_meta.outputs.api_image }}:staging"
          docker push "${{ steps.docker_meta.outputs.web_image }}:${{ github.sha }}"
          docker push "${{ steps.docker_meta.outputs.web_image }}:staging"
          docker push "${{ steps.docker_meta.outputs.migrate_image }}:${{ github.sha }}"
          docker push "${{ steps.docker_meta.outputs.migrate_image }}:staging"
          docker push "${{ steps.docker_meta.outputs.mysql_image }}:${{ github.sha }}"
          docker push "${{ steps.docker_meta.outputs.mysql_image }}:staging"

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs:
      - review
      - sql-mysql8
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check staging deploy secrets
        id: deploy_secrets
        env:
          STAGING_DEPLOY_HOST: ${{ secrets.STAGING_DEPLOY_HOST }}
          STAGING_DEPLOY_PORT: ${{ secrets.STAGING_DEPLOY_PORT }}
          STAGING_DEPLOY_USER: ${{ secrets.STAGING_DEPLOY_USER }}
          STAGING_DEPLOY_SSH_KEY: ${{ secrets.STAGING_DEPLOY_SSH_KEY }}
          STAGING_KNOWN_HOSTS: ${{ secrets.STAGING_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          if [ -z "${STAGING_DEPLOY_HOST}" ] || [ -z "${STAGING_DEPLOY_PORT}" ] || [ -z "${STAGING_DEPLOY_USER}" ] || [ -z "${STAGING_DEPLOY_SSH_KEY}" ] || [ -z "${STAGING_KNOWN_HOSTS}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Staging deploy secrets are incomplete. Skipping deployment."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure SSH
        if: steps.deploy_secrets.outputs.configured == 'true'
        env:
          STAGING_DEPLOY_SSH_KEY: ${{ secrets.STAGING_DEPLOY_SSH_KEY }}
          STAGING_KNOWN_HOSTS: ${{ secrets.STAGING_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          if printf '%s' "$STAGING_DEPLOY_SSH_KEY" | grep -q -- 'BEGIN OPENSSH PRIVATE KEY'; then
            printf '%s\n' "$STAGING_DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          elif printf '%s' "$STAGING_DEPLOY_SSH_KEY" | grep -q -- '\\n'; then
            printf '%b\n' "$STAGING_DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          elif printf '%s' "$STAGING_DEPLOY_SSH_KEY" | base64 -d > ~/.ssh/deploy_key 2>/dev/null; then
            :
          else
            echo "STAGING_DEPLOY_SSH_KEY must be a private key, not a .pub public key." >&2
            exit 1
          fi
          chmod 600 ~/.ssh/deploy_key
          if ! ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
            echo "STAGING_DEPLOY_SSH_KEY is not a valid OpenSSH private key. Use ~/.ssh/studyforge_staging_deploy, not ~/.ssh/studyforge_staging_deploy.pub." >&2
            exit 1
          fi
          printf '%s\n' "$STAGING_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Upload Docker deployment files
        if: steps.deploy_secrets.outputs.configured == 'true'
        env:
          STAGING_DEPLOY_HOST: ${{ secrets.STAGING_DEPLOY_HOST }}
          STAGING_DEPLOY_PORT: ${{ secrets.STAGING_DEPLOY_PORT }}
          STAGING_DEPLOY_USER: ${{ secrets.STAGING_DEPLOY_USER }}
        run: |
          set -euo pipefail
          scp -i ~/.ssh/deploy_key -P "$STAGING_DEPLOY_PORT" \
            deploy/docker/docker-compose.staging.yml \
            deploy/docker/.env.staging.example \
            scripts/deploy_staging_docker.sh \
            "${STAGING_DEPLOY_USER}@${STAGING_DEPLOY_HOST}:/tmp/"

      - name: Deploy on staging server
        if: steps.deploy_secrets.outputs.configured == 'true'
        env:
          STAGING_DEPLOY_HOST: ${{ secrets.STAGING_DEPLOY_HOST }}
          STAGING_DEPLOY_PORT: ${{ secrets.STAGING_DEPLOY_PORT }}
          STAGING_DEPLOY_USER: ${{ secrets.STAGING_DEPLOY_USER }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_READ_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          GHCR_READ_TOKEN_B64="$(printf '%s' "$GHCR_READ_TOKEN" | base64 -w0)"
          ssh -i ~/.ssh/deploy_key -p "$STAGING_DEPLOY_PORT" \
            "${STAGING_DEPLOY_USER}@${STAGING_DEPLOY_HOST}" \
            "GHCR_USERNAME='${GHCR_USERNAME}' GHCR_READ_TOKEN_B64='${GHCR_READ_TOKEN_B64}' bash /tmp/deploy_staging_docker.sh"
